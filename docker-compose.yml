version: '3.8'

services:
  app:
    image: php:8.2-cli
    container_name: siro-app
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - postgres
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: siro
      DB_USERNAME: siro
      DB_PASSWORD: siro_secret
      JWT_SECRET: change_this_to_a_strong_secret_with_at_least_32_characters
    command: >
      sh -c "docker-php-ext-install pdo pdo_mysql pdo_pgsql &&
             php siro key:generate &&
             php siro migrate &&
             php siro serve --port=8080"

  mysql:
    image: mysql:8.0
    container_name: siro-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: siro
      MYSQL_USER: siro
      MYSQL_PASSWORD: siro_secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  postgres:
    image: postgres:16
    container_name: siro-pgsql
    environment:
      POSTGRES_DB: siro
      POSTGRES_USER: siro
      POSTGRES_PASSWORD: siro_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  mysql_data:
  postgres_data:
