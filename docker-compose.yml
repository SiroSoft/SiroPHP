version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/storage/app.db
      JWT_SECRET: "${JWT_SECRET:-change-this-in-production-please-use-32-char}"
    volumes:
      - storage_data:/app/storage
    restart: unless-stopped

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: /app/storage/app.db
    volumes:
      - .:/app
      - storage_data:/app/storage
    restart: unless-stopped

volumes:
  storage_data:
