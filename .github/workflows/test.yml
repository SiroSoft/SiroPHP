name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: PHP syntax check
        run: find . -type f -name "*.php" -not -path "./vendor/*" -not -path "./storage/*" -print0 | xargs -0 -n1 php -l

  code-style:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHP_CodeSniffer (PSR-12)
        continue-on-error: true
        run: vendor/bin/phpcs --standard=PSR12 --ignore=vendor,storage .

  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPStan (Level Max)
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --level=max --no-progress

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPUnit Unit tests
        run: php vendor/bin/phpunit --testsuite=Unit --no-progress

  feature-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Prepare env
        run: |
          echo "=== ENV PREPARATION DEBUG ==="
          echo "Working directory: $(pwd)"
          echo ""
          echo "Listing all .env files:"
          ls -la .env* 2>&1 || echo "No .env files found at all"
          echo ""
          
          # Try to create .env from .env.testing or .env.example
          if [ ! -f .env ]; then
            if [ -f .env.testing ]; then
              echo "Copying .env.testing to .env..."
              cp .env.testing .env
            elif [ -f .env.example ]; then
              echo "Copying .env.example to .env..."
              cp .env.example .env
            else
              echo "ERROR: Neither .env.testing nor .env.example exists!"
              exit 1
            fi
          else
            echo ".env already exists, skipping copy"
          fi
          
          # Verify .env was created
          if [ ! -f .env ]; then
            echo "FATAL ERROR: .env file does not exist after copy attempt!"
            echo "Current directory contents:"
            ls -la
            exit 1
          fi
          
          echo ".env file exists: YES"
          echo ".env file size: $(wc -c < .env) bytes"
          echo ""
          
          # Configure for testing
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=storage/test.db|g' .env
          sed -i 's|CACHE_DRIVER=.*|CACHE_DRIVER=file|g' .env
          
          echo "Configuration updated:"
          grep -E "^(DB_DATABASE|CACHE_DRIVER|JWT_SECRET)" .env || echo "Warning: Could not find expected config keys"
          echo ""
          echo "First 15 lines of .env:"
          head -15 .env
          echo ""
          echo "=== ENV PREPARATION COMPLETE ==="
      - name: Migrate
        run: php siro migrate
      - name: PHPUnit Feature & Integration tests
        run: php vendor/bin/phpunit --testsuite=Feature,Integration --no-progress

  technical-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Prepare env
        run: |
          echo "=== TECHNICAL GATE ENV PREPARATION ==="
          if [ ! -f .env ]; then
            if [ -f .env.testing ]; then
              echo "Copying .env.testing to .env..."
              cp .env.testing .env
            elif [ -f .env.example ]; then
              echo "Copying .env.example to .env..."
              cp .env.example .env
            else
              echo "ERROR: No .env template found!"
              exit 1
            fi
          fi
          
          if [ ! -f .env ]; then
            echo "FATAL: .env not created!"
            ls -la
            exit 1
          fi
          
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=storage/test.db|g' .env
          sed -i 's|CACHE_DRIVER=.*|CACHE_DRIVER=file|g' .env
          echo ".env prepared successfully ($(wc -c < .env) bytes)"
          echo "=== READY FOR TECHNICAL GATE ==="
      - name: Run release technical gate
        run: composer release:check
