name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: PHP syntax check
        run: find . -type f -name "*.php" -not -path "./vendor/*" -not -path "./storage/*" -print0 | xargs -0 -n1 php -l

  code-style:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHP_CodeSniffer (PSR-12)
        continue-on-error: true
        run: vendor/bin/phpcs --standard=PSR12 --ignore=vendor,storage .

  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPStan
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPUnit Unit tests
        run: php vendor/bin/phpunit --testsuite=Unit --no-progress

  feature-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Prepare env
        run: |
          echo "Current directory: $(pwd)"
          echo "Checking for .env files..."
          ls -la .env* || echo "No .env files found"

          if [ ! -f .env ]; then
            echo "Creating .env from .env.testing..."
            cp .env.testing .env
            if [ ! -f .env ]; then
              echo "ERROR: .env file was not created!"
              exit 1
            fi
            echo ".env file created successfully"
          else
            echo ".env file already exists"
          fi

          sed -i 's|DB_DATABASE=.*|DB_DATABASE=storage/test.db|g' .env
          sed -i 's|CACHE_DRIVER=.*|CACHE_DRIVER=file|g' .env

          echo "Final .env contents (first 10 lines):"
          head -10 .env
          echo "---"
          echo "JWT_SECRET length: $(grep JWT_SECRET .env | cut -d'=' -f2 | wc -c)"
      - name: Migrate
        run: php siro migrate
      - name: PHPUnit Feature & Integration tests
        run: php vendor/bin/phpunit --testsuite=Feature,Integration --no-progress

  technical-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Prepare env
        run: |
          echo "Creating .env from .env.testing..."
          cp .env.testing .env
          if [ ! -f .env ]; then
            echo "ERROR: .env file was not created!"
            exit 1
          fi
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=storage/test.db|g' .env
          sed -i 's|CACHE_DRIVER=.*|CACHE_DRIVER=file|g' .env
          echo ".env file prepared for technical gate"
      - name: Run release technical gate
        run: composer release:check
