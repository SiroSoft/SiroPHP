name: Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: siro
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Ensure benchmark scripts are executable
        run: chmod +x benchmark/wrk.sh

      - name: Prepare CI environment
        run: |
          cp .env.example .env
          sed -i 's|APP_ENV=local|APP_ENV=local|g' .env
          sed -i 's|APP_DEBUG=true|APP_DEBUG=true|g' .env
          sed -i 's|JWT_SECRET=.*|JWT_SECRET=siro_ci_jwt_secret_2026_super_secure_key_abcd1234|g' .env
          sed -i 's|DB_HOST=.*|DB_HOST=127.0.0.1|g' .env
          sed -i 's|DB_PORT=.*|DB_PORT=3306|g' .env
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=siro|g' .env
          sed -i 's|DB_USERNAME=.*|DB_USERNAME=root|g' .env
          sed -i 's|DB_PASSWORD=.*|DB_PASSWORD=root|g' .env

      - name: Lint all PHP files
        run: |
          find . -type f -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

      - name: Run migrations
        run: php siro migrate

      - name: Runtime smoke test + verification
        run: |
          php -S localhost:8080 -t public > /tmp/siro-server.log 2>&1 &
          sleep 2
          curl -f http://localhost:8080/
          curl -f http://localhost:8080/users
          php tests/verify_v061.php
