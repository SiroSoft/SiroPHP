name: Test

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: PHP lint
        run: find . -type f -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  static-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: PHPStan
        run: |
          composer require --dev phpstan/phpstan --no-interaction --no-progress
          php vendor/bin/phpstan analyse --level 6 --no-progress 2>&1 | head -50

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Unit tests
        run: |
          php tests/unit/ValidatorTest.php
          php tests/unit/ResponseTest.php
          php tests/unit/RequestTest.php
          php tests/unit/RouterTest.php

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Prepare env
        run: |
          cp .env.testing .env
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=storage/test.db|g' .env
      - name: Migrate
        run: php siro migrate
      - name: Integration tests
        run: |
          php -S localhost:8080 -t public > /tmp/server.log 2>&1 &
          sleep 2
          php tests/integration_test.php
