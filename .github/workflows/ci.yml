name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, json, mbstring, openssl, fileinfo
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Composer Audit
        run: composer audit --format=table || echo "::warning::Composer audit found vulnerabilities"
      - name: PHPStan
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, json, mbstring, openssl, fileinfo
          tools: composer:v2
          coverage: xdebug
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Run tests
        run: php -d zend_extension=xdebug vendor/bin/phpunit --coverage-text
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
