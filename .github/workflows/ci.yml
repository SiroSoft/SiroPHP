name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, json, mbstring, openssl, fileinfo
          tools: composer:v2
          coverage: none
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Composer Audit
        run: composer audit --format=table || echo "::warning::Composer audit found vulnerabilities"
      - name: Generate SBOM
        run: php scripts/generate-sbom.php
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: storage/sbom/
      - name: Supply Chain Audit
        run: php scripts/audit-supply-chain.php
      - name: PHPStan (Level Max)
        run: php -d memory_limit=512M vendor/bin/phpstan analyse --level=max --no-progress --memory-limit=512M

  benchmark:
    name: Performance Regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, json, mbstring, openssl, fileinfo
          tools: composer:v2
      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist
      - name: Prepare environment
        run: |
          if [ ! -f .env ]; then
            if [ -f .env.testing ]; then
              cp .env.testing .env
            elif [ -f .env.example ]; then
              cp .env.example .env
            else
              echo "ERROR: No .env template found!"
              exit 1
            fi
          fi
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=storage/test.db|g' .env
          sed -i 's|CACHE_DRIVER=.*|CACHE_DRIVER=file|g' .env
      - name: Run benchmark regression check
        run: php scripts/benchmark-ci.php
      - name: Upload benchmark baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: storage/benchmark/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, json, mbstring, openssl, fileinfo
          tools: composer:v2
          coverage: xdebug
      - name: Install dependencies
        run: composer install --no-progress --prefer-dist
      - name: Prepare environment
        run: |
          if [ ! -f .env ]; then
            if [ -f .env.testing ]; then
              cp .env.testing .env
            elif [ -f .env.example ]; then
              cp .env.example .env
            else
              echo "ERROR: No .env template found!"
              exit 1
            fi
          fi
          sed -i 's|DB_DATABASE=.*|DB_DATABASE=storage/test.db|g' .env
          sed -i 's|CACHE_DRIVER=.*|CACHE_DRIVER=file|g' .env
      - name: Migrate database
        run: php siro migrate
      - name: SAST Linter
        run: php scripts/sast-linter.php
      - name: Run tests
        run: php -d zend_extension=xdebug vendor/bin/phpunit --coverage-text
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
